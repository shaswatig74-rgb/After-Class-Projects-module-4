<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h2>JavaScript Class Inheritance</h2>

<p id="details"></p>
<p id="static-info"></p>
<p id="greetings"></p>
<script>
    class Student {
        static schoolName = "Sunrise High School";

        constructor(name) {
            this.name = name;
        }

        present() {
            return `Student: ${this.name}`;
        }

        static hello() {
            return "Hello from the Student class!";
        }
    }

    class Grade extends Student {
    constructor(name, grade) {
    super(name);
    this.studentGrade = grade;
    }

    show() {
    return `${this.present()}, Grade: ${this.studentGrade}`;
}
    }
const myStudent = new Grade("Tina", "grade 6");
document.getElementById("details").innerHTML =
myStudent.show();
document.getElementById("static-info").innerHTML = Student.schoolName;
document.getElementById("greetings").innerHTML = Student.hello();
</script>    
</body>
</html>
